name: Self-test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  self-test:
    name: Action runs against committed fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Mix Coverage action
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-file: test/fixtures/mix_test_cover_1.20_large.txt
          minimum-coverage: 50
          minimum-module-coverage: 0
          include-changed-files: true
          comment: sticky
